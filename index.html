<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>サンプルサイト</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
<div class="logo">
  <img src="FCC_icon.jpg" alt="">
  <span>FAT CAT CLINIC</span>
</div>
  <div class="menu-btn" onclick="toggleMenu()">≡</div>

  <div class="menu" id="menu">
    <div><a href="#" class="active">トップ</a></div>
    <div><a href="doctor.html">医師紹介</a></div>
    <div><a href="rooms.html">個室一覧</a></div>
    <div><a href="menu.html">処方箋＆特典</a></div>
    <div><a href="https://docs.google.com/forms/d/e/1FAIpQLScGeY6jAjrhF7GvbKn03UDusQQ-_JL8GhUYXQqJsI2gJDrvLQ/viewform?usp=send_form">予約はこちら</a></div>
    <div><a href="access.html">アクセス</a></div>
  </div>
</header>

<div class="spacer"></div>

<!-- スライド -->
<div class="slider">
  <img id="slide" src="https://picsum.photos/800/300?1">
</div>

<!-- メイン見出し -->
<div class="main-heading">
  <h1>ようこそ！<br>FAT CAT CLINICへ！</h1>
  <p>明るくポップな空間で、皆様をお待ちしております♪</p>
</div>

<!-- 紹介 -->
<div class="section hp-section">
  <img src="Sample.jpg">
  <div class="text">
    <h2>サービス①</h2>
    <p>説明テキスト①</p>
  </div>
</div>

<div class="section hp-section">
  <img src="Sample.jpg">
  <div class="text">
    <h2>サービス②</h2>
    <p>説明テキスト②</p>
  </div>
</div>

<div class="section hp-section">
  <img src="Sample.jpg">
  <div class="text">
    <h2>サービス③</h2>
    <p>説明テキスト③</p>
  </div>
</div>

<footer>
  <p class="footerp">FAT CAT CLINIC</p>
  <p>©SQUARE ENIX</p>
</footer>

<script>
function toggleMenu() {
  const menu = document.getElementById("menu");
  menu.style.display = menu.style.display === "block" ? "none" : "block";
}

// スライド
let i = 1;
setInterval(() => {
  i++;
  if (i > 3) i = 1;
  document.getElementById("slide").src = `https://picsum.photos/800/300?${i}`;
}, 3000);

// スクロールアニメーション (Intersection Observer)
const observer = new IntersectionObserver((entries) => {
  entries.forEach(entry => {
    if (entry.isIntersecting) {
      entry.target.classList.add('visible');
    }
  });
}, { threshold: 0.15 });

document.addEventListener("DOMContentLoaded", () => {
  document.querySelectorAll('.hp-section').forEach(section => {
    observer.observe(section);
  });
});
</script>

</body>
</html>
